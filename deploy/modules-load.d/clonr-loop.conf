# clonr-loop.conf — pre-load the loop kernel module at boot
#
# Ensures /dev/loop* devices exist before clonr-serverd starts. Without this,
# the service may start before the loop module is loaded and losetup will fail
# to find any devices.
#
# The max_loop parameter is set in /etc/modprobe.d/clonr-loop.conf.
#
# Deploy: copy to /etc/modules-load.d/clonr-loop.conf on the target host.
loop
