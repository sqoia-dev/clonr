---
# clustr Ansible role — main task file
#
# Installs clustr-serverd on Rocky Linux 9 or Ubuntu 22.04 bare-metal hosts.
# Fully idempotent: re-running does not disrupt a running instance unless
# configuration actually changes.
#
# Tags:
#   install  — download binary, verify checksum
#   config   — write clustr.env, secrets.env
#   systemd  — install unit file, enable service
#   firewall — open ports via firewalld/ufw

# ─── Resolve version ────────────────────────────────────────────────────────────

- name: Resolve "latest" version tag from GitHub API
  uri:
    url: "https://api.github.com/repos/{{ clustr_github_repo }}/releases/latest"
    return_content: true
  register: _gh_release
  when: clustr_version == "latest"
  tags: install

- name: Set resolved version fact
  set_fact:
    _clustr_resolved_version: >-
      {{ (_gh_release.json.tag_name) if clustr_version == 'latest'
         else clustr_version }}
  tags: install

# ─── Check installed version ───────────────────────────────────────────────────

- name: Check installed clustr-serverd version
  command: "{{ clustr_bin_dir }}/clustr-serverd --version"
  register: _installed_version
  failed_when: false
  changed_when: false
  tags: install

- name: Set needs_install fact
  set_fact:
    _clustr_needs_install: >-
      {{ _installed_version.rc != 0 or
         (_clustr_resolved_version not in (_installed_version.stdout | default(''))) }}
  tags: install

# ─── Download and install binary ───────────────────────────────────────────────

- name: Determine host architecture
  set_fact:
    _clustr_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
  tags: install

- name: Download clustr-serverd binary
  get_url:
    url: "https://github.com/{{ clustr_github_repo }}/releases/download/{{ _clustr_resolved_version }}/clustr-serverd-linux-{{ _clustr_arch }}"
    dest: "{{ clustr_bin_dir }}/clustr-serverd.new"
    mode: "0755"
  when: _clustr_needs_install | bool
  notify: restart clustr-serverd
  tags: install

- name: Download clustr-serverd SHA-256 checksum
  get_url:
    url: "https://github.com/{{ clustr_github_repo }}/releases/download/{{ _clustr_resolved_version }}/clustr-serverd-linux-{{ _clustr_arch }}.sha256"
    dest: "/tmp/clustr-serverd.sha256"
    mode: "0644"
  when: _clustr_needs_install | bool
  tags: install

- name: Verify clustr-serverd checksum
  shell: |
    set -e
    EXPECTED=$(awk '{print $1}' /tmp/clustr-serverd.sha256)
    ACTUAL=$(sha256sum {{ clustr_bin_dir }}/clustr-serverd.new | awk '{print $1}')
    if [ "$EXPECTED" != "$ACTUAL" ]; then
      echo "FATAL: SHA-256 mismatch for clustr-serverd"
      echo "  expected: $EXPECTED"
      echo "  actual:   $ACTUAL"
      exit 1
    fi
    echo "Checksum OK: $ACTUAL"
  when: _clustr_needs_install | bool
  tags: install

- name: Atomically replace clustr-serverd binary
  command: "mv {{ clustr_bin_dir }}/clustr-serverd.new {{ clustr_bin_dir }}/clustr-serverd"
  when: _clustr_needs_install | bool
  tags: install

- name: Download clustr (static CLI binary)
  get_url:
    url: "https://github.com/{{ clustr_github_repo }}/releases/download/{{ _clustr_resolved_version }}/clustr-linux-{{ _clustr_arch }}"
    dest: "{{ clustr_bin_dir }}/clustr"
    mode: "0755"
  when: _clustr_needs_install | bool
  tags: install

# ─── Create data directories ───────────────────────────────────────────────────

- name: Create clustr data directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop:
    - "{{ clustr_data_dir }}"
    - "{{ clustr_data_dir }}/db"
    - "{{ clustr_image_dir }}"
    - "{{ clustr_boot_dir }}"
    - "{{ clustr_tftp_dir }}"
    - "{{ clustr_log_archive_dir }}"
    - "{{ clustr_tmp_dir }}"
    - "{{ clustr_backup_dir }}"
    - "{{ clustr_iso_cache_dir }}"
  tags: config

- name: Create clustr config directory
  file:
    path: "{{ clustr_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: config

# ─── Write secrets.env ─────────────────────────────────────────────────────────

- name: Fail if clustr_secret_key is not set
  fail:
    msg: >
      clustr_secret_key is required and must be overridden in Ansible Vault.
      Generate with: openssl rand -hex 32
  when: clustr_secret_key | length == 0
  tags: config

- name: Fail if clustr_session_secret is not set
  fail:
    msg: >
      clustr_session_secret is required and must be overridden in Ansible Vault.
      Generate with: openssl rand -hex 64
  when: clustr_session_secret | length == 0
  tags: config

- name: Write secrets.env
  copy:
    content: |
      # clustr secrets — generated by Ansible
      # DO NOT commit this file. Mode 0400, root-owned.
      CLUSTR_SECRET_KEY={{ clustr_secret_key }}
      CLUSTR_SESSION_SECRET={{ clustr_session_secret }}
    dest: "{{ clustr_config_dir }}/secrets.env"
    owner: root
    group: root
    mode: "0400"
  no_log: true    # prevent secret values appearing in Ansible output
  notify: restart clustr-serverd
  tags: config

# ─── Write clustr.env ─────────────────────────────────────────────────────────

- name: Write clustr.env
  template:
    src: clustr.env.j2
    dest: "{{ clustr_config_dir }}/clustr.env"
    owner: root
    group: root
    mode: "0600"
  notify: restart clustr-serverd
  tags: config

# ─── Install systemd unit ─────────────────────────────────────────────────────

- name: Install clustr-serverd systemd unit
  template:
    src: clustr-serverd.service.j2
    dest: /etc/systemd/system/clustr-serverd.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart clustr-serverd
  tags: systemd

- name: Enable and start clustr-serverd
  systemd:
    name: clustr-serverd
    state: started
    enabled: true
    daemon_reload: true
  tags: systemd

# ─── Install ops scripts ───────────────────────────────────────────────────────

- name: Create ops scripts directory
  file:
    path: /opt/clustr/scripts/ops
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: clustr_install_backup | bool
  tags: [config, install]

- name: Download clustr-backup.sh
  get_url:
    url: "https://raw.githubusercontent.com/{{ clustr_github_repo }}/{{ _clustr_resolved_version }}/scripts/ops/clustr-backup.sh"
    dest: /opt/clustr/scripts/ops/clustr-backup.sh
    mode: "0755"
  when: clustr_install_backup | bool
  tags: install

- name: Download clustr-backup-verify.sh
  get_url:
    url: "https://raw.githubusercontent.com/{{ clustr_github_repo }}/{{ _clustr_resolved_version }}/scripts/ops/clustr-backup-verify.sh"
    dest: /usr/local/sbin/clustr-backup-verify.sh
    mode: "0755"
  when: clustr_install_backup | bool
  tags: install

- name: Install backup systemd units
  get_url:
    url: "https://raw.githubusercontent.com/{{ clustr_github_repo }}/{{ _clustr_resolved_version }}/deploy/systemd/{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - clustr-backup.service
    - clustr-backup.timer
    - clustr-backup-verify.service
    - clustr-backup-verify.timer
  when: clustr_install_backup | bool
  notify: reload systemd
  tags: [systemd, install]

- name: Enable backup timers
  systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - clustr-backup.timer
    - clustr-backup-verify.timer
  when: clustr_install_backup | bool
  tags: systemd

# ─── Firewall rules ────────────────────────────────────────────────────────────

# Rocky Linux / RHEL — firewalld
- name: Open clustr ports (firewalld)
  firewalld:
    port: "{{ item.port }}/{{ item.proto }}"
    permanent: true
    state: enabled
    zone: "{{ 'trusted' if clustr_firewall_interface | length > 0 else 'public' }}"
    interface: "{{ clustr_firewall_interface if clustr_firewall_interface | length > 0 else omit }}"
    immediate: true
  loop: "{{ clustr_firewall_ports }}"
  when: clustr_firewall_tool == 'firewalld'
  notify: reload firewalld
  tags: firewall

# Ubuntu / Debian — ufw
- name: Open clustr ports (ufw)
  ufw:
    rule: allow
    interface_in: "{{ clustr_firewall_interface if clustr_firewall_interface | length > 0 else omit }}"
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
  loop: "{{ clustr_firewall_ports }}"
  when: clustr_firewall_tool == 'ufw'
  tags: firewall

# ─── Smoke test ────────────────────────────────────────────────────────────────

- name: Wait for clustr-serverd readiness endpoint
  uri:
    url: "http://{{ clustr_listen_addr }}/api/v1/healthz/ready"
    return_content: true
    timeout: 30
  register: _ready_check
  retries: 10
  delay: 5
  until: _ready_check.status == 200
  tags: [systemd, install]
