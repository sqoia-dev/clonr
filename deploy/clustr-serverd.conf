# /etc/clustr/clustr-serverd.conf
#
# Environment file for clustr-serverd. Loaded by systemd via:
#   EnvironmentFile=/etc/clustr/clustr-serverd.conf
#
# Lines starting with '#' are comments and are ignored by systemd.
# All values use shell KEY=VALUE syntax (no export, no quotes required
# unless the value contains whitespace or special characters).
#
# This file contains non-secret runtime configuration only.
# Secret values (CLUSTR_SESSION_SECRET) belong in /etc/clustr/secrets.env
# which should be chmod 0400 root:root and never committed or logged.
#
# After editing this file, run:
#   systemctl restart clustr-serverd
#
# Full documentation: https://github.com/sqoia-dev/clustr

# ---------------------------------------------------------------------------
# HTTP server
# ---------------------------------------------------------------------------

# CLUSTR_LISTEN_ADDR: address:port the HTTP API and web UI bind on.
# For a dedicated provisioning host, bind to the provisioning interface IP
# so the management interface is never exposed to production networks.
# Default: :8080 (all interfaces)
CLUSTR_LISTEN_ADDR=:8080

# ---------------------------------------------------------------------------
# Storage paths
# ---------------------------------------------------------------------------

# CLUSTR_IMAGE_DIR: where base OS images are stored.
# This directory needs significant space — 50 GB+ for a small image library.
CLUSTR_IMAGE_DIR=/var/lib/clustr/images

# CLUSTR_DB_PATH: SQLite database file.
CLUSTR_DB_PATH=/var/lib/clustr/db/clustr.db

# CLUSTR_REPO_DIR: root directory for the bundled Slurm package repository.
# Populated by `clustr-serverd bundle install`.
CLUSTR_REPO_DIR=/var/lib/clustr/repo

# CLUSTR_LOG_ARCHIVE_DIR: where log purge summary events are written.
CLUSTR_LOG_ARCHIVE_DIR=/var/lib/clustr/log-archive

# ---------------------------------------------------------------------------
# PXE server
# ---------------------------------------------------------------------------

# CLUSTR_PXE_ENABLED: set to 'true' to activate the built-in DHCP + TFTP
# server for PXE booting. Requires the provisioning interface to be configured.
# Set to 'false' if you manage DHCP externally.
CLUSTR_PXE_ENABLED=false

# CLUSTR_PXE_INTERFACE: network interface the DHCP server binds to.
# This must be the interface on the provisioning/cluster network, NOT your
# management or public interface.
# Example: CLUSTR_PXE_INTERFACE=eth1
CLUSTR_PXE_INTERFACE=

# CLUSTR_PXE_SERVER_IP: IP address of this host on the provisioning network.
# Advertised as the DHCP next-server (TFTP and iPXE chain-load target).
# Example: CLUSTR_PXE_SERVER_IP=10.99.0.1
CLUSTR_PXE_SERVER_IP=

# CLUSTR_PXE_RANGE: DHCP pool for provisioning nodes (start-end).
# These addresses are temporary — nodes keep whatever IP they are permanently
# assigned after the OS is deployed.
CLUSTR_PXE_RANGE=10.99.0.100-10.99.0.200

# CLUSTR_PXE_SUBNET_CIDR: prefix length of the provisioning subnet.
# Used in DHCP Option 1 (subnet mask). Default: 24 (255.255.255.0)
CLUSTR_PXE_SUBNET_CIDR=24

# ---------------------------------------------------------------------------
# Boot assets
# ---------------------------------------------------------------------------

# CLUSTR_BOOT_DIR: where the kernel (vmlinuz) and initramfs are stored.
# Populated by `clustr-serverd` at startup from embedded assets.
CLUSTR_BOOT_DIR=/var/lib/clustr/boot

# CLUSTR_TFTP_DIR: where TFTP-served iPXE binaries live (ipxe.efi, undionly.kpxe).
CLUSTR_TFTP_DIR=/var/lib/clustr/tftpboot

# ---------------------------------------------------------------------------
# LDAP (optional)
# ---------------------------------------------------------------------------

# CLUSTR_LDAP_DATA_DIR: root for slapd MDB files and backups.
CLUSTR_LDAP_DATA_DIR=/var/lib/clustr/ldap

# CLUSTR_LDAP_CONFIG_DIR: slapd.d cn=config tree and TLS certificates.
CLUSTR_LDAP_CONFIG_DIR=/etc/clustr/ldap

# CLUSTR_LDAP_PKI_DIR: CA key and certificate for LDAP TLS.
CLUSTR_LDAP_PKI_DIR=/etc/clustr/pki

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# CLUSTR_LOG_LEVEL: one of debug, info, warn, error. Default: info
CLUSTR_LOG_LEVEL=info

# CLUSTR_LOG_RETENTION: duration string (e.g. 7d, 168h). Default: 7d.
# Controls how long node provisioning log rows are kept.
# CLUSTR_LOG_RETENTION=7d

# CLUSTR_AUDIT_RETENTION: duration string for audit_log row TTL. Default: 90d.
# CLUSTR_AUDIT_RETENTION=90d

# ---------------------------------------------------------------------------
# Event log (JSONL sidecar)
# ---------------------------------------------------------------------------

# CLUSTR_EVENT_LOG_ROTATE_SIZE_MB: size threshold (MB) that triggers log rotation.
# The active events.jsonl is gzip-compressed and archived when it exceeds this size.
# Default: 100
# CLUSTR_EVENT_LOG_ROTATE_SIZE_MB=100

# CLUSTR_EVENT_LOG_ARCHIVE_COUNT: number of compressed archives to retain.
# Oldest archive is deleted when this limit is exceeded.
# Default: 10
# CLUSTR_EVENT_LOG_ARCHIVE_COUNT=10

# CLUSTR_EVENT_LOG_FSYNC_INTERVAL_MS: maximum elapsed time (ms) between forced
# fsyncs in the background flusher goroutine. Lower values reduce data loss on
# a crash at the cost of more I/O. Default: 1000 (1 second).
# CLUSTR_EVENT_LOG_FSYNC_INTERVAL_MS=1000

# CLUSTR_EVENT_LOG_FSYNC_EVERY_N_WRITES: maximum number of writes between forced
# fsyncs. Default: 100.
# CLUSTR_EVENT_LOG_FSYNC_EVERY_N_WRITES=100

# ---------------------------------------------------------------------------
# Dangerous-push gate
# ---------------------------------------------------------------------------

# CLUSTR_DANGEROUS_GATE_DISABLED: set to '1' to disable the dangerous-push
# two-phase confirmation gate. The gate is ON by default (Sprint 43-prime).
# Only disable this for debugging or emergency rollback — operators will be
# able to push dangerous plugins (e.g. sssd) without typed-confirm.
# CLUSTR_DANGEROUS_GATE_DISABLED=0

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------

# CLUSTR_SESSION_SECURE: set to '1' to mark session cookies as Secure.
# Only enable this when clustr-serverd is accessed via HTTPS (TLS termination
# proxy in front of it, or TLS enabled directly). If you enable this without
# TLS, browsers will refuse to send the session cookie and logins will fail.
CLUSTR_SESSION_SECURE=0

# CLUSTR_SECRET_MASTER_KEY_PATH: path to the master encryption key file.
# Used to encrypt secrets at rest. Generate with:
#   openssl rand -base64 32 > /etc/clustr/secret-master.key
#   chmod 0400 /etc/clustr/secret-master.key
CLUSTR_SECRET_MASTER_KEY_PATH=/etc/clustr/secret-master.key
