# clonr TFTP grub.cfg — served to GRUB when chainloaded via iPXE.
# GRUB fetches this via TFTP (not HTTP) because iPXE chainloads grub.efi
# which inherits the PXE/TFTP boot context. This stub redirects GRUB to
# the local disk's grub.cfg written by clonr finalize.

search --file --set=root /grub2/grub.cfg
if [ -f ($root)/grub2/grub.cfg ]; then
    configfile ($root)/grub2/grub.cfg
fi

search --file --set=root /EFI/rocky/grub.cfg
if [ -f ($root)/EFI/rocky/grub.cfg ]; then
    configfile ($root)/EFI/rocky/grub.cfg
fi

set root=(hd0,gpt2)
if [ -f /grub2/grub.cfg ]; then
    configfile /grub2/grub.cfg
fi

echo "clonr: grub.cfg not found on local disk"
echo "Dropping to GRUB shell for manual recovery."
