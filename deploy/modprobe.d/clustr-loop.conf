# clustr-loop.conf — loop device options for clustr-serverd
#
# max_loop=128: default is 8 or 16 depending on kernel build. The rootfs
# extraction pipeline allocates one loop device per concurrent build. 128
# provides headroom for dozens of parallel builds plus any loop devices held
# by the host OS for snap packages or other purposes.
#
# Deploy: copy to /etc/modprobe.d/clustr-loop.conf on the target host.
# The loop module must be re-loaded (or the host rebooted) for max_loop to
# take effect. At runtime, run:
#   modprobe -r loop && modprobe loop
# Only safe when no loop devices are currently in use (losetup -a is empty).
options loop max_loop=128
