# clustr Docker Compose — primary install path (Decision D7)
#
# Quick start:
#   1. Create /etc/clustr/ with clustr.env + secrets.env (see .env.example)
#   2. Create /var/lib/clustr/ directories (mkdir -p /var/lib/clustr/{db,images,boot,tftpboot,iso-cache,backups,log-archive,tmp})
#   3. docker compose up -d
#   4. docker compose logs -f clustr  # capture one-time bootstrap admin key
#
# Full install instructions: docs/install.md §3
#
# DHCP/TFTP note: network_mode: host is required because DHCP (UDP/67) and
# TFTP (UDP/69) must bind directly to the provisioning interface.  Docker's
# bridge networking filters broadcast packets, which breaks the DHCP server.
# host networking means the container shares the host network stack — the same
# CLUSTR_PXE_INTERFACE value you use in clustr.env refers to a real host NIC.

version: "3.9"

services:
  clustr:
    image: ghcr.io/sqoia-dev/clustr-server:latest
    restart: unless-stopped

    # Required: DHCP/TFTP must bind on the provisioning interface directly.
    # See CLUSTR_PXE_INTERFACE in clustr.env.
    network_mode: host

    # Load config from two files:
    #   clustr.env  — non-secret runtime configuration (paths, PXE settings, etc.)
    #   secrets.env — secret credentials (CLUSTR_SECRET_KEY, CLUSTR_SESSION_SECRET)
    # Both files must be created manually before `docker compose up`.
    # See .env.example for documented defaults and generation commands.
    env_file:
      - /etc/clustr/clustr.env
      - /etc/clustr/secrets.env

    volumes:
      # Primary data volume — DB, images, boot assets, TFTP root, ISO cache,
      # backups, log archive, and temp workspace.  100 GB+ recommended.
      - /var/lib/clustr:/var/lib/clustr

      # Hardware-accelerated ISO builds.  If /dev/kvm is not present the server
      # starts normally but ISO builds fall back to software emulation (slow).
      - /dev/kvm:/dev/kvm

    # Capabilities required by clustr-serverd:
    #   NET_BIND_SERVICE — bind privileged ports (DHCP/67, TFTP/69, API/8080)
    #   SYS_ADMIN        — systemd-nspawn chroot sessions + loop device mounts
    #   SYS_CHROOT       — chroot(2) call inside systemd-nspawn
    #   MKNOD            — create device nodes in container namespaces
    cap_add:
      - NET_BIND_SERVICE
      - SYS_ADMIN
      - SYS_CHROOT
      - MKNOD

    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun
      - /dev/loop-control:/dev/loop-control

    # Allow the server to access /dev/loop* block devices for rootfs extraction.
    # "privileged" is intentionally NOT used — explicit device grants are narrower.
    device_cgroup_rules:
      - "b 7:* rwm"   # loop block devices (major 7)

    # Health check uses the readiness endpoint (S1-10).  Unhealthy containers
    # are flagged in `docker compose ps` and in any orchestration layer above.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/healthz/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Resource ceiling: ISO builds spin up QEMU VMs (2 GB RAM each).
    # Adjust based on your expected concurrent build count.
    deploy:
      resources:
        limits:
          memory: 8G
