#version=RHEL9
# Rocky 9.7 Kickstart — clustr-server (VM 200)
# SeaBIOS (MBR/legacy boot) — NO UEFI, no /boot/efi partition
# Disk layout: scsi0=32GB (OS), scsi1=100GB (data at /var/lib/clustr)

# --- Installation source & method ---
# Use the local ISO (cdrom) as the package source — no internet required for base install
# Additional packages requiring network repos are installed in %post via dnf
cdrom

# Explicitly point Anaconda at the local ISO repos to prevent 10-minute network repo timeout.
# Rocky 9 minimal ISO exposes BaseOS and AppStream at these paths on the installer ramdisk.
# Without this, Anaconda tries to contact network repos and times out after ~10 minutes.
repo --name="BaseOS"   --baseurl=file:///run/install/repo/ --cost=100
repo --name="AppStream" --baseurl=file:///run/install/repo/AppStream --cost=100

# --- Locale / keyboard / timezone ---
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone America/Los_Angeles --utc

# --- Network ---
# Use MAC addresses to identify interfaces — device names during Anaconda install
# may differ from eth0/eth1 (net.ifnames=0 only applies to the installed OS, not the installer).
# MAC bc:24:11:e9:e9:7c = net0 (vmbr0, LAN), bc:24:11:72:7c:ca = net1 (vmbr10, provisioning)
network --bootproto=dhcp --device=BC:24:11:E9:E9:7C --onboot=yes --ipv6=auto --activate --hostname=clustr-server
# net1 — provisioning network (vmbr10), static 10.99.0.1/24, no gateway
network --bootproto=static --device=BC:24:11:72:7C:CA --ip=10.99.0.1 --netmask=255.255.255.0 --onboot=yes --activate

# --- Authentication ---
rootpw --iscrypted $6$Vqv2oDUNPYkkVwiL$cC/XeDGfp749w41MjfG1Arl.7WikrcJNWa1CHgJRLL47GFVolUXMCgpmL0IYA7/FHJuxLlrzVxe/HDB5/LF340
user --name=clustr --password=$6$Vqv2oDUNPYkkVwiL$cC/XeDGfp749w41MjfG1Arl.7WikrcJNWa1CHgJRLL47GFVolUXMCgpmL0IYA7/FHJuxLlrzVxe/HDB5/LF340 --iscrypted --groups=wheel

# --- SELinux / firewall ---
# permissive: logs policy violations without blocking — better than disabled.
# Upgrade to enforcing once policy is validated.
selinux --permissive
# Open only required ports: HTTP API (8080), TFTP (69/udp), DHCP (67-68/udp), SSH.
firewall --enabled --port=8080:tcp --port=69:udp --port=67:udp --port=68:udp --service=ssh

# --- Services ---
# Only enable services that are in %packages. qemu-guest-agent is installed in %post.
services --enabled=sshd

# --- Disk partitioning ---
# Target scsi0 (32GB). Zero MBR, wipe all existing partitions.
# SeaBIOS/MBR boot: biosboot partition (1MB) + /boot (1GB) + / (rest, XFS)
zerombr
clearpart --all --initlabel --drives=sda
bootloader --location=mbr --driveorder=sda --append="console=ttyS0,115200n8 console=tty0 net.ifnames=0 biosdevname=0"

# BIOS boot grub partition (required for GPT + MBR bootloader)
part biosboot   --fstype=biosboot --size=1      --ondisk=sda
# /boot
part /boot      --fstype=xfs     --size=1024    --ondisk=sda --label=boot
# / — all remaining space on sda
part /          --fstype=xfs     --size=1        --ondisk=sda --grow --label=root

# NOTE: scsi1 (100GB, /var/lib/clustr) is handled in %post — Anaconda
# should not touch it here to avoid partition table conflicts.

# --- Package selection (minimal — only what's on the ISO) ---
%packages
@^minimal-environment
openssh-server
rsync
tar
curl
parted
e2fsprogs
xfsprogs
dosfstools
util-linux
tmux
%end

# --- Post-install script (runs in chroot by default) ---
%post --log=/root/ks-post.log
set -euo pipefail

echo "=== clustr-server kickstart post-install ==="

# -------------------------------------------------------
# 0. Install packages that require network repos
# -------------------------------------------------------
echo "=== Installing additional packages from network repos ==="
dnf install -y epel-release || true
dnf install -y \
    qemu-guest-agent \
    git \
    wget \
    gdisk \
    ipmitool \
    vim-enhanced \
    gcc \
    make || echo "WARNING: some packages failed to install"

# -------------------------------------------------------
# 1. Enable core services
# -------------------------------------------------------
systemctl enable sshd
systemctl enable qemu-guest-agent || true

# -------------------------------------------------------
# 2. firewalld zone-based config with masquerade.
#    The kickstart --port/--service directives set basic rules;
#    we reconfigure here for the zone-based NAT gateway approach.
# -------------------------------------------------------
# Assign interfaces to zones for NAT gateway operation
firewall-cmd --zone=external --change-interface=eth0 --permanent 2>/dev/null || true
firewall-cmd --zone=internal --change-interface=eth1 --permanent 2>/dev/null || true

# External zone: masquerade + SSH + API
firewall-cmd --zone=external --add-masquerade --permanent 2>/dev/null || true
firewall-cmd --zone=external --add-service=ssh --permanent
firewall-cmd --zone=external --add-port=8080/tcp --permanent

# Internal zone: provisioning services
firewall-cmd --zone=internal --add-service=ssh --permanent
firewall-cmd --zone=internal --add-service=dhcp --permanent
firewall-cmd --zone=internal --add-service=dns --permanent
firewall-cmd --zone=internal --add-service=tftp --permanent
firewall-cmd --zone=internal --add-port=8080/tcp --permanent
firewall-cmd --zone=internal --add-port=636/tcp --permanent

# DHCP from 0.0.0.0 (pre-IP PXE clients) — direct iptables rule on eth1
firewall-cmd --permanent --direct --add-rule ipv4 filter INPUT 0 \
    -i eth1 -p udp --dport 67 -j ACCEPT

# Inter-zone forwarding policy (internal → external for NAT)
firewall-cmd --permanent --new-policy int-to-ext 2>/dev/null || true
firewall-cmd --permanent --policy int-to-ext --set-target ACCEPT 2>/dev/null || true
firewall-cmd --permanent --policy int-to-ext --add-ingress-zone internal 2>/dev/null || true
firewall-cmd --permanent --policy int-to-ext --add-egress-zone external 2>/dev/null || true

# NAT gateway — enable IP forwarding and masquerade for provisioning network
cat > /etc/sysctl.d/99-clustr-ipforward.conf << 'SYSCTL'
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
SYSCTL

# Install dnsmasq for provisioning network DNS forwarding
dnf install -y dnsmasq
mkdir -p /etc/dnsmasq.d
cat > /etc/dnsmasq.d/clustr-provisioning.conf << 'DNSMASQ'
# clustr provisioning network DNS forwarder
# Only listen on the provisioning interface — do not conflict with systemd-resolved
# or other DNS on eth0.
interface=eth1
bind-interfaces
domain-needed
bogus-priv
server=8.8.8.8
server=1.1.1.1
DNSMASQ
systemctl enable dnsmasq

# -------------------------------------------------------
# 3. Format and mount /dev/sdb (scsi1, 100GB data disk)
# -------------------------------------------------------
echo "=== Formatting /dev/sdb as XFS ==="
# Wipe any existing signatures
wipefs -a /dev/sdb || true
# Create GPT label and a single partition covering the whole disk
parted -s /dev/sdb mklabel gpt
parted -s /dev/sdb mkpart primary xfs 1MiB 100%
# Wait for kernel to settle the new partition table
sleep 2
partprobe /dev/sdb
sleep 2
# Format as XFS
mkfs.xfs -f -L clustr-data /dev/sdb1

# Add to fstab by label (robust across disk reordering)
echo "LABEL=clustr-data  /var/lib/clustr  xfs  defaults,noatime  0  2" >> /etc/fstab
# devpts is required for pty allocation (shell-session WebSocket handler).
# Without this mount, /dev/ptmx returns ENODEV even though the device node exists.
echo "devpts  /dev/pts  devpts  ptmxmode=666,mode=620,gid=5  0  0" >> /etc/fstab

# Mount now so we can create directories
mkdir -p /var/lib/clustr
mount /dev/sdb1 /var/lib/clustr

# -------------------------------------------------------
# 4. Create clustr directory structure
# -------------------------------------------------------
mkdir -p /var/lib/clustr/{images,boot,tftpboot,db}

# -------------------------------------------------------
# 5. Install Go 1.24.2 to /usr/local/go
#    (1.25 not released as of Rocky 9.7 baseline; use latest stable)
# -------------------------------------------------------
echo "=== Installing Go ==="
GO_VERSION="1.24.2"
GO_TARBALL="go${GO_VERSION}.linux-amd64.tar.gz"
GO_URL="https://go.dev/dl/${GO_TARBALL}"
GO_SHA256="68097bd680839e04cfc2fc5b77da5b3d63cf8f8aacfa03f30f8f424d2bf58dc1"

cd /tmp
wget -q "${GO_URL}" -O "${GO_TARBALL}"
echo "${GO_SHA256}  ${GO_TARBALL}" | sha256sum -c -
rm -rf /usr/local/go
tar -C /usr/local -xzf "${GO_TARBALL}"
rm -f "${GO_TARBALL}"

# -------------------------------------------------------
# 6. Add Go to PATH system-wide
# -------------------------------------------------------
cat > /etc/profile.d/go.sh << 'GOPROFILE'
export PATH=$PATH:/usr/local/go/bin:/root/go/bin
GOPROFILE
chmod 644 /etc/profile.d/go.sh

# Source it for the remainder of this %post script
export PATH=$PATH:/usr/local/go/bin

# -------------------------------------------------------
# 7. Clone and build clustr
# -------------------------------------------------------
echo "=== Cloning clustr repo ==="
git clone https://github.com/sqoia-dev/clustr.git /opt/clustr

echo "=== Building clustr binaries ==="
cd /opt/clustr
# CGO_ENABLED=0 for a fully static binary
CGO_ENABLED=0 /usr/local/go/bin/go build -o /usr/local/bin/clustr ./cmd/clustr
/usr/local/go/bin/go build -o /usr/local/bin/clustr-serverd ./cmd/clustr-serverd
chmod 755 /usr/local/bin/clustr /usr/local/bin/clustr-serverd

echo "=== clustr build complete ==="
ls -lh /usr/local/bin/clustr /usr/local/bin/clustr-serverd

# -------------------------------------------------------
# 8. Install clustr-serverd systemd unit from the cloned repo.
#    Using the repo unit avoids drift between the kickstart and
#    the version-controlled unit (capabilities, resource limits,
#    security hardening directives, etc.).
# -------------------------------------------------------
cp /opt/clustr/deploy/systemd/clustr-serverd.service /etc/systemd/system/clustr-serverd.service
systemctl daemon-reload

# Enable (do NOT start — OS isn't fully up yet in chroot)
systemctl enable clustr-serverd

# -------------------------------------------------------
# 9. SSH hardening — key auth preferred but password auth
#    left on for initial lab access
# -------------------------------------------------------
sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

# -------------------------------------------------------
# 10. net.ifnames=0 already set in bootloader --append above.
#     Write udev rule as belt-and-suspenders to keep eth0/eth1.
# -------------------------------------------------------
cat > /etc/udev/rules.d/70-persistent-net.rules << 'UDEV'
# clustr-server — predictable names disabled; eth0/eth1 via kernel ordering
SUBSYSTEM=="net", ACTION=="add", ATTR{address}=="bc:24:11:e9:e9:7c", NAME="eth0"
SUBSYSTEM=="net", ACTION=="add", ATTR{address}=="bc:24:11:72:7c:ca", NAME="eth1"
UDEV

echo "=== Post-install complete ==="
%end

# --- Reboot after install ---
reboot --eject
