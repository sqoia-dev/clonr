# clustr.db migration chain — Sprint 42 MIGRATE-CHAIN
#
# Each entry:
#   id:          unique numeric identifier (matches file number prefix)
#   filename:    SQL file name (must match a file in this directory)
#   description: human-readable description shown in startup logs
#   applied_to:  "clustr" (all entries in this file target clustr.db)
#   requires:    list of migration IDs that must be applied first
#
# Rules enforced by the runner:
#   - Every .sql file in this directory must have an entry here.
#   - Every entry here must have a corresponding .sql file.
#   - Drift in either direction = startup failure.
#   - Migrations run in the order listed here, not alphabetical filename order.
#   - The requires list is checked before applying each migration.
#
# NOTE: 102b is an anomaly — it falls between 102 and 103 lexicographically
# and logically depends on 102. It is registered as id 1025 (after 102, before 103)
# so the ordering is correct while keeping IDs numeric-friendly.
