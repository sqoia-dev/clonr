<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="clonr-token" content="">
    <title>clustr</title>
    <link rel="stylesheet" href="/ui/css/style.css">
    <link rel="stylesheet" href="/ui/css/xterm.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%233b82f6'/><g transform='translate(4,4) scale(1)' fill='none' stroke='white' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><line x1='12' y1='12' x2='6' y2='5'/><line x1='12' y1='12' x2='19' y2='7'/><line x1='12' y1='12' x2='8' y2='20'/><line x1='12' y1='12' x2='19' y2='18'/><circle cx='12' cy='12' r='2.6' fill='white'/><circle cx='6' cy='5' r='1.7' fill='white'/><circle cx='19' cy='7' r='1.7' fill='white'/><circle cx='8' cy='20' r='1.7' fill='white'/><circle cx='19' cy='18' r='1.7' fill='white'/></g></svg>">
</head>
<body>
<div id="app">
    <a href="#main-content" class="skip-to-content">Skip to main content</a>

    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Site">
        <div class="sidebar-logo">
            <div class="sidebar-logo-mark">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <line x1="12" y1="12" x2="6" y2="5"/><line x1="12" y1="12" x2="19" y2="7"/><line x1="12" y1="12" x2="8" y2="20"/><line x1="12" y1="12" x2="19" y2="18"/><circle cx="12" cy="12" r="2.6" fill="currentColor"/><circle cx="6" cy="5" r="1.7" fill="currentColor"/><circle cx="19" cy="7" r="1.7" fill="currentColor"/><circle cx="8" cy="20" r="1.7" fill="currentColor"/><circle cx="19" cy="18" r="1.7" fill="currentColor"/>
                </svg>
            </div>
            <div>
                <div class="sidebar-logo-text">clustr</div>
            </div>
        </div>

        <!-- Cluster status strip (populated by JS) -->
        <div class="cluster-strip" id="cluster-strip">
            <span class="live-dot"></span>
            <span class="cluster-name" id="cluster-name">cluster</span>
            <span class="cluster-meta" id="cluster-meta"></span>
        </div>

        <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
            <a href="#/" class="nav-item" id="nav-dash">
                <!-- dashboard icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <span>Dashboard</span>
            </a>
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-sidebar);opacity:0.65;padding:4px 12px 2px;">CLONR</div>
            <a href="#/images" class="nav-item" id="nav-images">
                <!-- layers/image icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                    <polyline points="2 17 12 22 22 17"/>
                    <polyline points="2 12 12 17 22 12"/>
                </svg>
                <span>Images</span>
            </a>
            <a href="#/nodes" class="nav-item" id="nav-nodes">
                <!-- server icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/>
                    <line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
                <span>Nodes</span>
            </a>

            <!-- Network module nav — gated on admin access; lives under CLONR section -->
            <div id="nav-network-section" style="display:none;">
                <a href="#/network/switches" class="nav-item" id="nav-network-switches">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <rect x="2" y="6" width="20" height="12" rx="2"/>
                        <line x1="6" y1="12" x2="6.01" y2="12"/><line x1="10" y1="12" x2="10.01" y2="12"/><line x1="18" y1="9" x2="18" y2="15"/>
                    </svg>
                    <span>Switches</span>
                </a>
                <a href="#/network/profiles" class="nav-item" id="nav-network-profiles">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
                    </svg>
                    <span>Profiles</span>
                </a>
            </div>

            <!-- System Accounts module nav — always visible for admins -->
            <div id="nav-system-section" style="display:none;">
                <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
                <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-sidebar);opacity:0.65;padding:4px 12px 2px;">SYSTEM</div>
                <a href="#/system/accounts" class="nav-item" id="nav-system-accounts">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    </svg>
                    <span>Accounts</span>
                </a>
                <a href="#/system/groups" class="nav-item" id="nav-system-groups">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Groups</span>
                </a>
            </div>

            <!-- Slurm module nav — Config editor gated on enabled; Settings always visible -->
            <div id="nav-slurm-section">
                <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
                <details open>
                <summary>Slurm</summary>
                <div id="nav-slurm-managed" style="display:none;">
                    <a href="#/slurm/configs" class="nav-item" id="nav-slurm-configs">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                        <span>Config Files</span>
                    </a>
                    <a href="#/slurm/scripts" class="nav-item" id="nav-slurm-scripts">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <polyline points="16 18 22 12 16 6"/>
                            <polyline points="8 6 2 12 8 18"/>
                        </svg>
                        <span>Scripts</span>
                    </a>
                    <a href="#/slurm/sync" class="nav-item" id="nav-slurm-sync">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <polyline points="1 4 1 10 7 10"/>
                            <polyline points="23 20 23 14 17 14"/>
                            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                        </svg>
                        <span>Sync Status</span>
                    </a>
                    <a href="#/slurm/push" class="nav-item" id="nav-slurm-push">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                        <span>Push</span>
                    </a>
                    <a href="#/slurm/builds" class="nav-item" id="nav-slurm-builds">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                        <span>Builds</span>
                    </a>
                    <a href="#/slurm/upgrades" class="nav-item" id="nav-slurm-upgrades">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <polyline points="17 1 21 5 17 9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7 23 3 19 7 15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                        <span>Upgrades</span>
                    </a>
                </div>
                <a href="#/slurm" class="nav-item" id="nav-slurm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                        <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                        <line x1="6" y1="6" x2="6.01" y2="6"/>
                        <line x1="6" y1="18" x2="6.01" y2="18"/>
                    </svg>
                    <span>Settings</span>
                    <span id="nav-slurm-status-badge" class="badge badge-neutral badge-sm" style="margin-left:6px;">Disabled</span>
                </a>
                </details>
            </div>

            <!-- LDAP module nav — Users+Groups gated on enabled; Settings always visible -->
            <div id="nav-ldap-section">
                <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
                <details open>
                <summary>LDAP</summary>
                <div id="nav-ldap-managed" style="display:none;">
                    <a href="#/ldap/users" class="nav-item" id="nav-ldap-users">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <span>Users</span>
                    </a>
                    <a href="#/ldap/groups" class="nav-item" id="nav-ldap-groups">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                        </svg>
                        <span>Groups</span>
                    </a>
                </div>
                <a href="#/ldap" class="nav-item" id="nav-ldap">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <circle cx="12" cy="8" r="4"/><path d="M2 20c0-4 4-7 10-7s10 3 10 7"/>
                    </svg>
                    <span>Settings</span>
                    <span id="nav-ldap-status-badge" class="badge badge-neutral badge-sm" style="display:none;margin-left:6px;">Disabled</span>
                </a>
                </details>
            </div>
        </nav>

        <div class="sidebar-footer" aria-label="User and status">
            <div class="user-avatar" id="user-avatar"></div>
            <div class="user-info">
                <span class="user-name" id="user-name">operator</span>
                <span class="user-role" id="user-role">admin</span>
            </div>
            <button class="footer-btn" id="settings-btn" title="Settings" aria-label="Settings" onclick="window.location.hash='#/settings'">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <button class="footer-btn" id="logout-btn" title="Sign out" aria-label="Sign out" onclick="Auth.logout()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
        <!-- Session expiry banner -->
        <div id="session-expiry-banner" style="display:none;background:#f59e0b;color:#1e293b;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;" onclick="Auth.extendSession()"></div>
    </aside>

    <!-- Main content -->
    <main id="main-content" role="main">
        <div class="loading"><div class="spinner"></div>Loading…</div>
    </main>

</div>

<script src="/ui/js/xterm.js"></script>
<script src="/ui/js/xterm-addon-fit.js"></script>
<script src="/ui/js/api.js"></script>
<script src="/ui/js/logs.js"></script>
<script src="/ui/js/ldap.js"></script>
<script src="/ui/js/sysaccounts.js"></script>
<script src="/ui/js/network.js"></script>
<script src="/ui/js/slurm.js"></script>
<script src="/ui/js/app.js"></script>
</body>
</html>
