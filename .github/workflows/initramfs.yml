name: Initramfs

on:
  push:
    tags:
      - "v*"

# S6-9 — Gate initramfs artifact on ci.yml success.
#
# The initramfs binary is the most sensitive release artifact: it runs as root
# on every node during a deploy.  Shipping a broken or test-failing binary
# would affect every node that PXE-boots on next reimage.
#
# Combined with release.yml's needs: [lab-validate], the full gate chain is:
#   go test passes (ci.yml / test job)
#   → initramfs built + reproducibility verified (this workflow)
#   → lab-validate passes (vm201 BIOS + vm202 UEFI)
#   → release artifacts published (release.yml)
#
# #162 (Path A): SSH-pull-from-cloner replaced with builder image.
#   CI pulls ghcr.io/sqoia-dev/initramfs-builder:<kernel-version>, which
#   contains the pinned kernel modules at /modules.  The build runs inside the
#   container; MODULES_PATH=/modules is passed to make.  No dependency on
#   192.168.1.151 availability.
#
#   Builder image is built separately via initramfs-builder.yml (workflow_dispatch).
#   It is NOT rebuilt on every push.
#
# Reproducibility: two back-to-back builds are compared by SHA256.  A mismatch
# fails the job before the artifact is attached to the release.

jobs:
  # ─── CI gate ─────────────────────────────────────────────────────────────────
  ci:
    name: CI gate (lint + test + build + security)
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ─── Build initramfs ─────────────────────────────────────────────────────────
  build-initramfs:
    name: Build initramfs image
    # Only execute after the full CI suite (lint, test, build, gosec, govulncheck,
    # trivy) is green.  This means no initramfs is attached to a release if any
    # test or security check fails.
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Run the job inside the builder image so /modules is already populated.
    # The image is pushed by initramfs-builder.yml; pulled here as a cache.
    # IMPORTANT: container.image cannot reference env.* — kernel version is
    # hardcoded here.  Must match packaging/initramfs-builder/Dockerfile ARG
    # KERNEL_VERSION and Makefile INITRAMFS_KERNEL_VERSION.
    # Update all three locations together when the kernel pin changes.
    container:
      image: ghcr.io/sqoia-dev/initramfs-builder:5.14.0-503.40.1.el9_5.x86_64
      # modules: pre-populated at /modules inside the image; no volume mount needed.
      options: --user root

    steps:
      - uses: actions/checkout@v5

      - name: Install Go inside builder container
        # The builder image ships golang from dnf; verify it is on PATH.
        run: go version

      - name: Build static clustr client
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath \
              -ldflags="-s -w -X main.version=${TAG}" \
              -o bin/clustr \
              ./cmd/clustr

      # ── Reproducibility check ─────────────────────────────────────────────
      # Build twice with make initramfs-verify, which asserts SHA256 equality.
      # Both builds run in the same container, same /modules, same binaries.
      # Any source of non-determinism (unsorted find, embedded timestamps) fails here.
      - name: Verify reproducible initramfs (build twice, assert SHA256 match)
        run: make initramfs-verify MODULES_PATH=/modules

      # ── Final build for release artifact ─────────────────────────────────
      # initramfs-verify cleans up its temp images; produce the release artifact.
      - name: Build release initramfs
        run: make initramfs MODULES_PATH=/modules

      - name: Attach initramfs to release
        uses: softprops/action-gh-release@v2
        with:
          append_body: false
          files: |
            initramfs-clustr.img
            initramfs-clustr.modules.manifest
