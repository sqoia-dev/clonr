name: Initramfs

on:
  push:
    tags:
      - "v*"

# S6-9 — Gate initramfs artifact on ci.yml success.
#
# The initramfs binary is the most sensitive release artifact: it runs as root
# on every node during a deploy.  Shipping a broken or test-failing binary
# would affect every node that PXE-boots on next reimage.
#
# Combined with release.yml's needs: [lab-validate], the full gate chain is:
#   go test passes (ci.yml / test job)
#   → initramfs built (this workflow)
#   → lab-validate passes (vm201 BIOS + vm202 UEFI)
#   → release artifacts published (release.yml)
#
# Implementation: this workflow calls ci.yml as a reusable workflow and declares
# needs: [ci] on the build job.  The ci job must complete successfully before
# the initramfs is built and attached to the release.

jobs:
  # ─── CI gate ─────────────────────────────────────────────────────────────────
  ci:
    name: CI gate (lint + test + build + security)
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ─── Build initramfs ─────────────────────────────────────────────────────────
  build-initramfs:
    name: Build initramfs image
    # Only execute after the full CI suite (lint, test, build, gosec, govulncheck,
    # trivy) is green.  This means no initramfs is attached to a release if any
    # test or security check fails.
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build static clustr client
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath \
              -ldflags="-s -w -X main.version=${TAG}" \
              -o bin/clustr \
              ./cmd/clustr

      - name: Build initramfs
        # CLUSTR_CI_MODE=1 switches the build script to local mode:
        # kernel modules are sourced from the runner's installed packages
        # instead of SSH-ing to the lab server (192.168.1.151).
        # The resulting initramfs is functional but kernel modules may differ
        # from the production lab build; lab-validate.yml catches regressions.
        env:
          CLUSTR_CI_MODE: "1"
        run: bash scripts/build-initramfs.sh bin/clustr

      - name: Attach initramfs to release
        uses: softprops/action-gh-release@v2
        with:
          append_body: false
          files: initramfs-clustr.img
