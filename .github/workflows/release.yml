name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  lab-validate:
    name: Lab Validation Gate (vm201 BIOS + vm202 UEFI)
    # Calls lab-validate.yml as a reusable workflow. The release job declares
    # needs: [lab-validate] so no release artifact is published unless both
    # vm201 (BIOS) and vm202 (UEFI) reach a login prompt. S1-14 / BUILD-5.
    uses: ./.github/workflows/lab-validate.yml
    secrets: inherit

  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -v -count=1 -timeout 120s

  build-client:
    name: Build client (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
              -ldflags="-s -w -X main.version=${TAG}" \
              -o clustr-${{ matrix.goos }}-${{ matrix.goarch }} \
              ./cmd/clustr

      - name: SHA256 checksum
        run: sha256sum clustr-${{ matrix.goos }}-${{ matrix.goarch }} > clustr-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            clustr-${{ matrix.goos }}-${{ matrix.goarch }}
            clustr-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  build-server:
    name: Build server (linux/amd64)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        env:
          TAG: ${{ github.ref_name }}
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${TAG}" \
            -o clustr-serverd-linux-amd64 \
            ./cmd/clustr-serverd

      - name: SHA256 checksum
        run: sha256sum clustr-serverd-linux-amd64 > clustr-serverd-linux-amd64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: server-linux-amd64
          path: |
            clustr-serverd-linux-amd64
            clustr-serverd-linux-amd64.sha256

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-client, build-server, lab-validate]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ### Client (static binary, runs in initramfs)
            ```sh
            curl -sL https://github.com/sqoia-dev/clustr/releases/download/${{ github.ref_name }}/clustr-linux-amd64 -o /usr/local/bin/clustr
            chmod +x /usr/local/bin/clustr
            ```

            ### Server
            ```sh
            curl -sL https://github.com/sqoia-dev/clustr/releases/download/${{ github.ref_name }}/clustr-serverd-linux-amd64 -o /usr/local/bin/clustr-serverd
            chmod +x /usr/local/bin/clustr-serverd
            ```
          files: |
            clustr-linux-amd64
            clustr-linux-amd64.sha256
            clustr-linux-arm64
            clustr-linux-arm64.sha256
            clustr-serverd-linux-amd64
            clustr-serverd-linux-amd64.sha256
