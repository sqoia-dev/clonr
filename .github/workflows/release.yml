name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  lab-validate:
    name: Lab Validation Gate (vm201 BIOS + vm202 UEFI)
    # Calls lab-validate.yml as a reusable workflow.
    #
    # INFORMATIONAL (non-blocking): GitHub-hosted runners cannot reach the
    # private lab network (192.168.1.x).  Failures here do NOT block release
    # publication — this job is intentionally removed from `release` needs.
    # See lab-validate.yml for the upgrade path to a self-hosted runner.
    # S1-14 / BUILD-5.
    uses: ./.github/workflows/lab-validate.yml
    secrets: inherit

  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        working-directory: web
        run: pnpm test --run

      - name: Build web assets
        working-directory: web
        run: pnpm build

      - name: Copy dist for Go embed
        run: |
          rm -rf internal/server/web/dist
          cp -r web/dist internal/server/web/dist

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -v -count=1 -timeout 120s

  build-client:
    name: Build client (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            nfpm_arch: amd64
          - goos: linux
            goarch: arm64
            nfpm_arch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build client binary
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
              -ldflags="-s -w -X main.version=${TAG}" \
              -o clustr-${{ matrix.goos }}-${{ matrix.goarch }} \
              ./cmd/clustr

      - name: SHA256 checksum
        run: sha256sum clustr-${{ matrix.goos }}-${{ matrix.goarch }} > clustr-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      # Install nfpm from release tarball — no Go module overhead
      - name: Install nfpm
        run: |
          NFPM_VERSION=2.41.4
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz nfpm
          chmod +x nfpm
          mv nfpm /usr/local/bin/nfpm
          nfpm --version

      # Import GPG key for package signing
      - name: Import GPG signing key
        env:
          CLUSTR_GPG_PRIVATE_KEY: ${{ secrets.CLUSTR_GPG_PRIVATE_KEY }}
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          echo "${CLUSTR_GPG_PRIVATE_KEY}" | gpg --batch --import
          # Pre-configure gpg-agent so rpmsign can sign non-interactively
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye || true

      - name: Build CLI RPM
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.nfpm_arch }}
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          # Strip leading 'v' from tag for package version
          PKG_VERSION="${VERSION#v}"
          VERSION="${PKG_VERSION}" ARCH="${ARCH}" \
            nfpm pkg --config nfpm-cli.yaml --packager rpm --target dist/

      - name: Sign CLI RPM
        env:
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          # Get key fingerprint from the imported key
          KEY_FP=$(gpg --list-keys --with-colons clustr-release@sqoia.dev 2>/dev/null \
            | awk -F: '/^fpr:/{print $10; exit}')
          for rpm_file in dist/*.rpm; do
            echo "${CLUSTR_GPG_PASSPHRASE}" | \
              rpmsign --addsign \
                --define "_gpg_name ${KEY_FP}" \
                --define "_gpg_path ${HOME}/.gnupg" \
                --define "__gpg_check_password_cmd /bin/true" \
                --define "__gpg_sign_cmd %{__gpg} gpg --batch --no-tty --passphrase-fd 0 --pinentry-mode loopback -u \"%{_gpg_name}\" --detach-sign --armor <(cat %{__plaintext_filename}) > %{__signature_filename}" \
                "${rpm_file}" 2>&1 || true
          done

      - name: Build CLI DEB
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.nfpm_arch }}
        run: |
          PKG_VERSION="${VERSION#v}"
          VERSION="${PKG_VERSION}" ARCH="${ARCH}" \
            nfpm pkg --config nfpm-cli.yaml --packager deb --target dist/

      - name: Sign CLI DEB
        env:
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          KEY_FP=$(gpg --list-keys --with-colons clustr-release@sqoia.dev 2>/dev/null \
            | awk -F: '/^fpr:/{print $10; exit}')
          for deb_file in dist/*.deb; do
            dpkg-sig --sign builder -k "${KEY_FP}" "${deb_file}" || true
          done

      - name: SHA256 checksums for packages
        run: |
          (cd dist && sha256sum *.rpm *.deb >> ../checksums-cli-${{ matrix.nfpm_arch }}.txt) 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            clustr-${{ matrix.goos }}-${{ matrix.goarch }}
            clustr-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
            dist/
            checksums-cli-${{ matrix.nfpm_arch }}.txt

  build-server:
    name: Build server (linux/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
          - goarch: arm64
            nfpm_arch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        working-directory: web
        run: pnpm build

      - name: Copy dist for Go embed
        run: |
          rm -rf internal/server/web/dist
          cp -r web/dist internal/server/web/dist

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build server binary
        env:
          TAG: ${{ github.ref_name }}
          SLURM_VERSION: ${{ vars.SLURM_VERSION || '' }}
          BUNDLE_SHA256: ${{ vars.BUNDLE_SHA256 || '' }}
        run: |
          # Read bundle metadata from versions.yml for ldflags
          SLURM_VER=$(awk '/^slurm:/{in_slurm=1} in_slurm && /version:/{gsub(/[" ]/, "", $2); print $2; exit}' build/slurm/versions.yml)
          CLUSTR_REL=$(awk '/^clustr_release:/{gsub(/[" ]/, "", $2); print $2; exit}' build/slurm/versions.yml)
          BUNDLE_VER="v${SLURM_VER}-clustr${CLUSTR_REL}"
          BUNDLE_SHA=$(awk '/^bundle_sha256:/{gsub(/[" ]/, "", $2); print $2; exit}' build/slurm/versions.yml 2>/dev/null || echo "")
          if [ -z "${BUNDLE_SHA}" ]; then
            BUNDLE_SHA="575ead6b320ff70b9496e5464a7536a224c35639f7c61bac0fec63721e7394b4"
          fi

          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
              -ldflags="-s -w \
                -X main.version=${TAG} \
                -X main.builtinSlurmVersion=${SLURM_VER} \
                -X main.builtinSlurmBundleVersion=${BUNDLE_VER} \
                -X main.builtinSlurmBundleSHA256=${BUNDLE_SHA}" \
              -o clustr-serverd-linux-${{ matrix.goarch }} \
              ./cmd/clustr-serverd

      - name: SHA256 checksum
        run: sha256sum clustr-serverd-linux-${{ matrix.goarch }} > clustr-serverd-linux-${{ matrix.goarch }}.sha256

      - name: Install nfpm
        run: |
          NFPM_VERSION=2.41.4
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz nfpm
          chmod +x nfpm
          mv nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Import GPG signing key
        env:
          CLUSTR_GPG_PRIVATE_KEY: ${{ secrets.CLUSTR_GPG_PRIVATE_KEY }}
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          echo "${CLUSTR_GPG_PRIVATE_KEY}" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye || true

      - name: Build server RPM
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.nfpm_arch }}
        run: |
          PKG_VERSION="${VERSION#v}"
          VERSION="${PKG_VERSION}" ARCH="${ARCH}" \
            nfpm pkg --config nfpm.yaml --packager rpm --target dist/

      - name: Sign server RPM
        env:
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          KEY_FP=$(gpg --list-keys --with-colons clustr-release@sqoia.dev 2>/dev/null \
            | awk -F: '/^fpr:/{print $10; exit}')
          for rpm_file in dist/*.rpm; do
            echo "${CLUSTR_GPG_PASSPHRASE}" | \
              rpmsign --addsign \
                --define "_gpg_name ${KEY_FP}" \
                --define "_gpg_path ${HOME}/.gnupg" \
                --define "__gpg_check_password_cmd /bin/true" \
                --define "__gpg_sign_cmd %{__gpg} gpg --batch --no-tty --passphrase-fd 0 --pinentry-mode loopback -u \"%{_gpg_name}\" --detach-sign --armor <(cat %{__plaintext_filename}) > %{__signature_filename}" \
                "${rpm_file}" 2>&1 || true
          done

      - name: Build server DEB
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.nfpm_arch }}
        run: |
          PKG_VERSION="${VERSION#v}"
          VERSION="${PKG_VERSION}" ARCH="${ARCH}" \
            nfpm pkg --config nfpm.yaml --packager deb --target dist/

      - name: Sign server DEB
        env:
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          KEY_FP=$(gpg --list-keys --with-colons clustr-release@sqoia.dev 2>/dev/null \
            | awk -F: '/^fpr:/{print $10; exit}')
          for deb_file in dist/*.deb; do
            dpkg-sig --sign builder -k "${KEY_FP}" "${deb_file}" || true
          done

      - name: SHA256 checksums for packages
        run: |
          (cd dist && sha256sum *.rpm *.deb >> ../checksums-server-${{ matrix.nfpm_arch }}.txt) 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: server-linux-${{ matrix.goarch }}
          path: |
            clustr-serverd-linux-${{ matrix.goarch }}
            clustr-serverd-linux-${{ matrix.goarch }}.sha256
            dist/
            checksums-server-${{ matrix.nfpm_arch }}.txt

  publish-repo:
    name: Publish to pkg.sqoia.dev
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    steps:
      - uses: actions/checkout@v5

      # Download all package artifacts from both build jobs
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: all-artifacts/

      - name: Collect packages
        run: |
          mkdir -p repo-staging/rpm/x86_64 repo-staging/rpm/aarch64 \
                   repo-staging/deb/pool/stable/main/amd64 \
                   repo-staging/deb/pool/stable/main/arm64

          # RPM packages (nfpm uses x86_64 / aarch64 naming)
          find all-artifacts -name '*amd64*.rpm' -o -name '*x86_64*.rpm' | \
            xargs -I{} cp {} repo-staging/rpm/x86_64/ 2>/dev/null || true
          find all-artifacts -name '*arm64*.rpm' -o -name '*aarch64*.rpm' | \
            xargs -I{} cp {} repo-staging/rpm/aarch64/ 2>/dev/null || true

          # DEB packages
          find all-artifacts -name '*amd64*.deb' | \
            xargs -I{} cp {} repo-staging/deb/pool/stable/main/amd64/ 2>/dev/null || true
          find all-artifacts -name '*arm64*.deb' | \
            xargs -I{} cp {} repo-staging/deb/pool/stable/main/arm64/ 2>/dev/null || true

          echo "=== Staged packages ==="
          find repo-staging -name '*.rpm' -o -name '*.deb'

      - name: Install repo tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            createrepo-c dpkg-dev apt-utils gnupg2 dpkg-sig

      - name: Import GPG signing key
        env:
          CLUSTR_GPG_PRIVATE_KEY: ${{ secrets.CLUSTR_GPG_PRIVATE_KEY }}
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          echo "${CLUSTR_GPG_PRIVATE_KEY}" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye || true
          # Export public key in both armored (RPM) and binary (DEB) formats
          gpg --armor --export clustr-release@sqoia.dev > repo-staging/RPM-GPG-KEY-clustr
          gpg --dearmor < repo-staging/RPM-GPG-KEY-clustr > repo-staging/clustr.gpg

      - name: Generate RPM .repo file
        run: |
          cat > repo-staging/clustr.repo << 'EOF'
          [clustr]
          name=clustr - $basearch
          baseurl=https://pkg.sqoia.dev/clustr/rpm/$basearch
          enabled=1
          gpgcheck=1
          gpgkey=https://pkg.sqoia.dev/clustr/RPM-GPG-KEY-clustr
          EOF

      - name: Build RPM repodata
        run: |
          for arch_dir in repo-staging/rpm/*/; do
            if ls "${arch_dir}"*.rpm 1>/dev/null 2>&1; then
              createrepo_c "${arch_dir}"
            fi
          done

      - name: Build DEB repo metadata
        env:
          CLUSTR_GPG_PASSPHRASE: ${{ secrets.CLUSTR_GPG_PASSPHRASE }}
        run: |
          KEY_FP=$(gpg --list-keys --with-colons clustr-release@sqoia.dev 2>/dev/null \
            | awk -F: '/^fpr:/{print $10; exit}')

          REPO_ROOT="repo-staging/deb"
          mkdir -p "${REPO_ROOT}/dists/stable/main/binary-amd64" \
                   "${REPO_ROOT}/dists/stable/main/binary-arm64"

          # Generate Packages file for each architecture
          for arch in amd64 arm64; do
            POOL_DIR="pool/stable/main/${arch}"
            BINARY_DIR="dists/stable/main/binary-${arch}"
            if ls "${REPO_ROOT}/${POOL_DIR}/"*.deb 1>/dev/null 2>&1; then
              (cd "${REPO_ROOT}" && \
                dpkg-scanpackages --arch "${arch}" "${POOL_DIR}" > "${BINARY_DIR}/Packages")
              gzip -k "${REPO_ROOT}/${BINARY_DIR}/Packages"
            fi
          done

          # Generate Release file
          cat > "${REPO_ROOT}/dists/stable/Release" << RELEASE
          Origin: Sqoia Labs
          Label: clustr
          Suite: stable
          Codename: stable
          Components: main
          Architectures: amd64 arm64
          Description: clustr HPC node cloning and image management packages
          RELEASE

          # Sign the Release file with GPG (creates InRelease and Release.gpg)
          (cd "${REPO_ROOT}/dists/stable" && \
            gpg --batch --yes --passphrase "${CLUSTR_GPG_PASSPHRASE}" \
              --pinentry-mode loopback \
              --default-key "${KEY_FP}" \
              --clearsign -o InRelease Release && \
            gpg --batch --yes --passphrase "${CLUSTR_GPG_PASSPHRASE}" \
              --pinentry-mode loopback \
              --default-key "${KEY_FP}" \
              --detach-sign -o Release.gpg Release) || true

      - name: Rsync to pkg.sqoia.dev
        env:
          PKG_DEPLOY_KEY: ${{ secrets.PKG_DEPLOY_KEY }}
        run: |
          # Write deploy key and lock it down
          install -m 0600 /dev/null /tmp/pkg_deploy_key
          echo "${PKG_DEPLOY_KEY}" > /tmp/pkg_deploy_key

          rsync -avz --delete \
            -e "ssh -i /tmp/pkg_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            repo-staging/ \
            deploy@66.175.212.72:/var/www/pkg.sqoia.dev/clustr/

          rm -f /tmp/pkg_deploy_key

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    # lab-validate intentionally removed from needs — informational only.
    needs: [build-client, build-server, publish-repo]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ### Rocky / RHEL / Fedora
            ```sh
            sudo rpm --import https://pkg.sqoia.dev/clustr/RPM-GPG-KEY-clustr
            sudo dnf config-manager --add-repo https://pkg.sqoia.dev/clustr/clustr.repo
            sudo dnf install clustr-serverd
            ```

            ### Debian / Ubuntu
            ```sh
            curl -fsSL https://pkg.sqoia.dev/clustr/clustr.gpg | sudo tee /etc/apt/keyrings/clustr.gpg >/dev/null
            echo "deb [signed-by=/etc/apt/keyrings/clustr.gpg] https://pkg.sqoia.dev/clustr/deb stable main" | sudo tee /etc/apt/sources.list.d/clustr.list
            sudo apt update && sudo apt install clustr-serverd
            ```

            ### Direct binary download (server)
            ```sh
            curl -sL https://github.com/sqoia-dev/clustr/releases/download/${{ github.ref_name }}/clustr-serverd-linux-amd64 -o /usr/sbin/clustr-serverd
            chmod +x /usr/sbin/clustr-serverd
            ```

            ### CLI only
            ```sh
            curl -sL https://github.com/sqoia-dev/clustr/releases/download/${{ github.ref_name }}/clustr-linux-amd64 -o /usr/local/bin/clustr
            chmod +x /usr/local/bin/clustr
            ```
          files: |
            clustr-linux-amd64
            clustr-linux-amd64.sha256
            clustr-linux-arm64
            clustr-linux-arm64.sha256
            clustr-serverd-linux-amd64
            clustr-serverd-linux-amd64.sha256
            clustr-serverd-linux-arm64
            clustr-serverd-linux-arm64.sha256
            dist/*.rpm
            dist/*.deb
