name: CI

on:
  push:
    branches: [main]
  pull_request:
  # workflow_call allows other workflows (initramfs.yml) to use this as a gate.
  # S6-9: initramfs.yml declares needs: [ci] and calls this workflow so that
  # no initramfs artifact is published unless lint, test, build, and all three
  # security scanners pass.
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build (verify compilation)
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -v -count=1 -timeout 300s

      # F4 (v1.5.0): CSP regression test suite — asserts no inline scripts or
      # event handlers in served HTML, CSP header present, Alpine CSP build used.
      # Uses Node.js built-in test runner (node:test), no npm install required.
      - name: Setup Node.js for CSP tests
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS CSP policy tests
        run: node --test test/js/csp-policy.test.mjs

      - name: JS app-utils unit tests
        run: node --test test/js/app-utils.test.mjs

  # I9: Link checker — fails on broken markdown links / fragment refs in docs/*.md.
  # Uses markdown-link-check via npx (no npm install required).
  # External URLs are skipped (--config) to avoid flaky network failures in CI;
  # only relative file links and fragment anchors are checked.
  link-check:
    name: Link check (docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check markdown links in docs/
        run: |
          npx --yes markdown-link-check \
            --config .github/mlc-config.json \
            $(find docs -name "*.md" | sort) \
            README.md CHANGELOG.md

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Build clustr (static, linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o bin/clustr ./cmd/clustr

      - name: Build clustr-serverd
        run: go build -trimpath -o bin/clustr-serverd ./cmd/clustr-serverd

      - name: Verify static linking
        run: file bin/clustr | grep -q "statically linked"

  # ─────────────────────────────────────────────────────────────────────────
  # Security scanning — S3-12
  #
  # Three scanners run in parallel after lint passes:
  #   gosec       — Go static analysis for security issues
  #   govulncheck — Go vulnerability database check (stdlib + deps)
  #   trivy       — Container image vulnerability scan (HIGH/CRITICAL)
  #
  # Threshold: HIGH severity findings fail the build.
  #
  # False-positive suppressions and accepted-risk decisions are documented in
  # .github/security-allowlist.yaml.  Do not suppress a finding without a
  # corresponding entry in that file.
  # ─────────────────────────────────────────────────────────────────────────

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      # Install gosec.  Pin to a specific version for reproducibility.
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      # Excluded rules and rationale — all documented in .github/security-allowlist.yaml:
      #   G115 — uint64→int64 disk-size conversions; int64 max is 9.2 EB, safe for HPC use
      #   G118 — context.Background in goroutines that must outlive HTTP requests
      #   G122 — WalkDir race-prone paths; admin-controlled directories, low actual risk
      #   G702 — Command injection taint on hardcoded system binaries (systemctl, journalctl, slapcat)
      #   G703 — Path traversal taint; paths originate from DB/config, UUID-validated at API layer
      #   G704 — SSRF taint on CLI client calling operator-configured URL and on w.Write() responses
      #
      # Severity threshold: HIGH.  -severity high causes gosec to exit non-zero if any
      # HIGH finding is present AFTER the exclusions above.
      - name: Run gosec
        run: |
          gosec \
            -exclude=G115,G118,G122,G702,G703,G704 \
            -severity=high \
            -confidence=medium \
            -fmt=sarif \
            -out=gosec-results.sarif \
            ./... || (cat gosec-results.sarif && exit 1)

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif
          category: gosec
        # Continue if SARIF upload fails (e.g. private repos without GHAS)
        continue-on-error: true

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # govulncheck exits non-zero if any vulnerability is found in call paths
      # reachable from the codebase.  All stdlib vulns are fixed by bumping
      # go.mod to go 1.25.9.  If new findings appear, check whether go.mod needs
      # a further patch bump, or document an acceptance in security-allowlist.yaml.
      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image locally (linux/amd64 only for CI speed; multi-arch push
      # happens only on tag via docker.yml).  Load into the local Docker daemon
      # so trivy can scan it.
      - name: Build container image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: clustr-server:ci-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the locally-built image using the official trivy action.
      #   exit-code: 1     — non-zero exit if findings at or above threshold
      #   severity: HIGH,CRITICAL — threshold: HIGH and above fail the build
      #   ignore-unfixed: true — do not fail on vulns with no available fix
      #   vuln-type: os,library — scan both OS packages and language deps
      #
      # If a finding has a fix available and is HIGH/CRITICAL, the build fails.
      # Document any accepted findings in .github/security-allowlist.yaml.
      - name: Scan image with trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: clustr-server:ci-scan
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          format: table

      # Emit SARIF for GitHub Security tab — separate step so it runs even if scan fails.
      - name: Trivy SARIF output
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: clustr-server:ci-scan
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          format: sarif
          output: trivy-results.sarif

      - name: Upload trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true
