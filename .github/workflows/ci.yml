name: CI

on:
  push:
    branches: [main]
  pull_request:
  # workflow_call allows other workflows (initramfs.yml) to use this as a gate.
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Build web assets
        run: cd web && pnpm build

      - name: Copy dist for Go embed
        run: |
          rm -rf internal/server/web/dist
          cp -r web/dist internal/server/web/dist

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build (verify compilation)
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Build web assets
        run: cd web && pnpm build

      - name: Copy dist for Go embed
        run: |
          rm -rf internal/server/web/dist
          cp -r web/dist internal/server/web/dist

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -v -count=1 -timeout 300s

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Build web assets
        run: cd web && pnpm build

      - name: Copy dist for Go embed
        run: |
          rm -rf internal/server/web/dist
          cp -r web/dist internal/server/web/dist

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: Build clustr (static, linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o bin/clustr ./cmd/clustr

      - name: Build clustr-serverd (with embedded web)
        run: go build -trimpath -o bin/clustr-serverd ./cmd/clustr-serverd

      - name: Verify static linking
        run: file bin/clustr | grep -q "statically linked"

      - name: Smoke-run clustr-serverd
        run: |
          D=$(mktemp -d)
          mkdir -p "$D/db" "$D/images" "$D/boot" "$D/tftpboot" "$D/repo" "$D/ldap" "$D/log-archive"
          CLUSTR_DB_PATH="$D/db/clustr.db" \
          CLUSTR_IMAGE_DIR="$D/images" \
          CLUSTR_BOOT_DIR="$D/boot" \
          CLUSTR_TFTP_DIR="$D/tftpboot" \
          CLUSTR_REPO_DIR="$D/repo" \
          CLUSTR_LDAP_DATA_DIR="$D/ldap" \
          CLUSTR_LOG_ARCHIVE_DIR="$D/log-archive" \
          ./bin/clustr-serverd &
          SERVER_PID=$!
          sleep 4
          # The SPA index.html contains "clustr"
          BODY=$(curl -sf http://localhost:8080/ 2>/dev/null || echo "")
          kill $SERVER_PID 2>/dev/null || true
          echo "$BODY" | grep -qi "clustr" || (echo "Unexpected body: $BODY" && exit 1)

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Build web assets
        run: cd web && pnpm build

      - name: Copy dist for Go embed
        run: |
          rm -rf internal/server/web/dist
          cp -r web/dist internal/server/web/dist

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      - name: Run gosec
        run: |
          gosec \
            -exclude=G115,G118,G122,G702,G703,G704 \
            -severity=high \
            -confidence=medium \
            -fmt=sarif \
            -out=gosec-results.sarif \
            ./... || (cat gosec-results.sarif && exit 1)

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec-results.sarif
          category: gosec
        continue-on-error: true

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Build web assets
        run: cd web && pnpm build

      - name: Copy dist for Go embed
        run: |
          rm -rf internal/server/web/dist
          cp -r web/dist internal/server/web/dist

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: clustr-server:ci-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: clustr-server:ci-scan
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          format: table

      - name: Trivy SARIF output
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: clustr-server:ci-scan
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          format: sarif
          output: trivy-results.sarif

      - name: Upload trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true
