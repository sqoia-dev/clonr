# .github/workflows/slurm-build.yml
#
# Slurm RPM build pipeline - PR2 of the Slurm-from-source pipeline.
#
# Trigger: tag push matching slurm-v* (e.g. slurm-v24.11.4-clustr1)
#
# What this does:
#   1. Inside a pinned Rocky 9 container, downloads the SchedMD tarball,
#      verifies it via dual SHA256 check (pinned in versions.yml + live
#      SchedMD SHA256 file), builds RPMs with rpmbuild -ta, signs them,
#      runs createrepo_c, generates manifest.json, tarballs the bundle.
#   2. Creates a GitHub Release and attaches: signed RPMs, bundle tarball,
#      bundle .sha256, manifest.json, and the clustr public key.
#
# See docs/slurm-build-pipeline.md for full design rationale.
#
# NON-GOALS (deferred to later PRs/sprints):
#   - workflow_dispatch and schedule triggers (sprint 2)
#   - EL10 / aarch64 build targets (sprint 2)
#   - cosign signing (sprint 2)
#   - clustr-server bundle-install wiring (PR3/PR4)

on:
  push:
    tags:
      - "slurm-v*"

jobs:
  build:
    name: Build Slurm RPMs (${{ matrix.target.os }}-${{ matrix.target.arch }})
    runs-on: ubuntu-latest

    # Run inside the pinned Rocky Linux 9 container so rpmbuild and all
    # EL9 toolchain deps are native.  The container digest pins the exact
    # image layer for reproducibility; update via PR when needed.
    #
    # Decision: use container: at job level so all steps share the same
    # container filesystem without explicit volume mounts.
    container:
      image: ${{ matrix.target.container_digest }}
      options: --user root

    strategy:
      fail-fast: true
      matrix:
        target:
          # EL9 x86_64 is the MVP target.  EL10 and aarch64 deferred.
          - os: el9
            arch: x86_64
            container_digest: "docker.io/rockylinux/rockylinux:9@sha256:ee90dc0e23c2f59af63886aed78c495fc847c8f0af7e825f48746547ddb7fbe2"

    outputs:
      bundle_name: ${{ steps.bundle.outputs.bundle_name }}
      bundle_sha256: ${{ steps.bundle.outputs.bundle_sha256 }}
      slurm_version: ${{ steps.versions.outputs.slurm_version }}
      clustr_release: ${{ steps.versions.outputs.clustr_release }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Parse versions.yml ────────────────────────────────────────────────
      # Decision: use grep+sed instead of yq to avoid adding a tool dep to
      # the Rocky container.  versions.yml is a simple flat YAML file so
      # the grep approach is reliable and the field names are stable.
      - name: Read versions.yml
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          VERSIONS_FILE="build/slurm/versions.yml"

          SLURM_VERSION=$(grep -E '^\s+version:' "$VERSIONS_FILE" | head -1 \
            | sed 's/.*version: *"\?\([^"]*\)"\?.*/\1/')
          SLURM_SHA256=$(grep 'tarball_sha256:' "$VERSIONS_FILE" \
            | sed 's/.*tarball_sha256: *"\?\([^"]*\)"\?.*/\1/')
          CLUSTR_RELEASE=$(grep '^clustr_release:' "$VERSIONS_FILE" \
            | sed 's/clustr_release: *\([0-9]*\).*/\1/')

          echo "slurm_version=${SLURM_VERSION}" | tee -a "$GITHUB_OUTPUT"
          echo "slurm_sha256=${SLURM_SHA256}" | tee -a "$GITHUB_OUTPUT"
          echo "clustr_release=${CLUSTR_RELEASE}" | tee -a "$GITHUB_OUTPUT"

          echo "--- versions parsed ---"
          echo "  slurm_version  : ${SLURM_VERSION}"
          echo "  slurm_sha256   : ${SLURM_SHA256}"
          echo "  clustr_release : ${CLUSTR_RELEASE}"

      # ── Install EPEL + build dependencies ────────────────────────────────
      # Repo setup required before the main install:
      #   1. epel-release: provides munge-devel, libjwt-devel, createrepo_c, etc.
      #   2. CRB (CodeReady Builder): provides json-c-devel, libyaml-devel and
      #      other devel headers that EPEL depends on but ships in CRB on EL9.
      #   3. mariadb module: mariadb-devel is in the AppStream mariadb module
      #      and requires explicit module enable to be visible.
      #
      # Optional packages (freeipmi-devel, rrdtool-devel, http-parser-devel):
      # These enable optional Slurm features (IPMI, rrd, REST). They may not
      # be available in EPEL+CRB for all EL9 snapshots. Install with
      # --skip-unavailable so a missing optional dep doesn't abort the build.
      # If missing, the corresponding Slurm feature is simply disabled by the
      # spec's conditional %if checks. See docs/slurm-build-pipeline.md §4.3.
      - name: Enable EPEL and install build dependencies
        shell: bash
        run: |
          set -euo pipefail

          # 1. EPEL
          dnf install -y epel-release

          # 2. CRB (CodeReady Builder) — needed by EPEL packages on EL9
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager --set-enabled crb

          # 3. Enable mariadb AppStream module so mariadb-devel is visible
          dnf module enable -y mariadb

          # 4. Mandatory build deps — hard fail if any are missing.
          # Note: the Rocky 9 base container ships curl-minimal which conflicts
          # with the full curl package. Use --allowerasing to allow DNF to
          # replace curl-minimal with curl. The full curl binary is only needed
          # at workflow script level for tarball download; libcurl-devel is the
          # actual Slurm build dep.
          dnf install -y --allowerasing \
            gcc gcc-c++ make \
            automake autoconf libtool \
            rpm-build rpm-sign \
            createrepo_c \
            gnupg2 \
            munge munge-devel \
            mariadb-devel \
            pam-devel \
            readline-devel \
            hwloc-devel \
            libcurl-devel \
            json-c-devel \
            libyaml-devel \
            libjwt-devel \
            lz4-devel \
            zlib-devel \
            numactl-devel \
            dbus-devel \
            openssl-devel \
            perl-devel \
            perl-ExtUtils-MakeMaker \
            python3 \
            curl

          # 5. Optional build deps — skip if unavailable on this snapshot.
          # Missing deps disable the corresponding Slurm plugin at build time.
          dnf install -y --skip-unavailable \
            http-parser-devel \
            freeipmi-devel \
            rrdtool-devel || true

          echo "--- Installed build dependencies ---"
          rpm -qa gcc rpm-build munge-devel mariadb-devel | sort

      # ── Download tarball ──────────────────────────────────────────────────
      - name: Download Slurm tarball
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.slurm_version }}"
          URL="https://download.schedmd.com/slurm/slurm-${VERSION}.tar.bz2"
          echo "Downloading ${URL} ..."
          curl -fSL -o "slurm-${VERSION}.tar.bz2" "${URL}"
          echo "Download complete."

      # ── Dual SHA256 verification ──────────────────────────────────────────
      # Check 1: compare against the pinned sha256 from versions.yml.
      # Check 2: cross-reference against the live SchedMD SHA256 file.
      #
      # NOTE: SchedMD does NOT publish detached GPG signatures (.asc) for
      # release tarballs as of 2026-04-27 (documented in versions.yml).
      # The dual SHA256 chain is the trust anchor.
      # See docs/slurm-build-pipeline.md §5.2.
      - name: Verify tarball SHA256 (dual check)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.slurm_version }}"
          PINNED_SHA256="${{ steps.versions.outputs.slurm_sha256 }}"
          TARBALL="slurm-${VERSION}.tar.bz2"

          echo "--- Check 1: pinned SHA256 from versions.yml ---"
          ACTUAL_SHA256=$(sha256sum "${TARBALL}" | awk '{print $1}')
          echo "  pinned : ${PINNED_SHA256}"
          echo "  actual : ${ACTUAL_SHA256}"
          if [ "${ACTUAL_SHA256}" != "${PINNED_SHA256}" ]; then
            echo "FATAL: SHA256 mismatch against pinned value"
            exit 1
          fi
          echo "  PASS"

          echo ""
          echo "--- Check 2: cross-reference against live SchedMD SHA256 file ---"
          SCHEDMD_SHA256_URL="https://download.schedmd.com/slurm/SHA256"
          LIVE_SHA256=$(curl -fsSL "${SCHEDMD_SHA256_URL}" \
            | grep "${TARBALL}\$" \
            | awk '{print $1}')
          if [ -z "${LIVE_SHA256}" ]; then
            echo "FATAL: tarball not found in SchedMD SHA256 file"
            exit 1
          fi
          echo "  schedmd live : ${LIVE_SHA256}"
          echo "  actual       : ${ACTUAL_SHA256}"
          if [ "${ACTUAL_SHA256}" != "${LIVE_SHA256}" ]; then
            echo "FATAL: SHA256 mismatch against live SchedMD SHA256 file"
            exit 1
          fi
          echo "  PASS"
          echo ""
          echo "Both SHA256 checks passed."

      # ── Import clustr signing key ─────────────────────────────────────────
      # Use a temp GPG homedir to avoid polluting the container's default
      # keyring.  Import with --pinentry-mode loopback so no TTY is needed.
      #
      # Non-interactive rpm --addsign: we override %__gpg_sign_cmd in
      # ~/.rpmmacros to pass the passphrase via --passphrase-file.
      # All rpmmacros lines are written with printf to avoid heredoc issues.
      #
      # GNUPGHOME and GPG_PASS_FILE are exported via GITHUB_ENV so they
      # persist across all subsequent steps in this job.
      - name: Import clustr RPM signing key
        shell: bash
        env:
          CLUSTR_RPM_SIGNING_KEY: ${{ secrets.CLUSTR_RPM_SIGNING_KEY }}
          CLUSTR_RPM_SIGNING_PASSPHRASE: ${{ secrets.CLUSTR_RPM_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail

          GPG_HOME=$(mktemp -d)
          chmod 700 "$GPG_HOME"
          echo "GNUPGHOME=${GPG_HOME}" >> "$GITHUB_ENV"

          PASS_FILE=$(mktemp)
          chmod 600 "$PASS_FILE"
          printf '%s' "${CLUSTR_RPM_SIGNING_PASSPHRASE}" > "$PASS_FILE"
          echo "GPG_PASS_FILE=${PASS_FILE}" >> "$GITHUB_ENV"

          printf '%s' "${CLUSTR_RPM_SIGNING_KEY}" | \
            gpg --homedir "${GPG_HOME}" \
                --batch \
                --pinentry-mode loopback \
                --passphrase-file "${PASS_FILE}" \
                --import

          gpg --homedir "${GPG_HOME}" --list-secret-keys

          # Write ~/.rpmmacros with printf to avoid heredoc YAML parse issues.
          # %__gpg_sign_cmd overrides the gpg invocation used by rpm --addsign.
          #
          # Argument order is load-bearing:
          #   -sbo %{__signature_filename} %{__plaintext_filename}
          # matches the default RPM sign command format on EL9 (rpm 4.16+).
          # The -s (sign), -b (binary), -o (output) flags are the standard
          # detached-sig form that RPM expects.  The output file must come
          # BEFORE the input file.
          printf '%%_signature gpg\n' > ~/.rpmmacros
          printf '%%_gpg_name 41E51A6653BBA540\n' >> ~/.rpmmacros
          printf '%%__gpg /usr/bin/gpg\n' >> ~/.rpmmacros
          printf '%%__gpg_sign_cmd %%{__gpg} gpg --no-verbose --no-armor --homedir %s --batch --pinentry-mode loopback --passphrase-file %s --no-secmem-warning -u "%%{_gpg_name}" --digest-algo sha256 -sbo %%{__signature_filename} %%{__plaintext_filename}\n' \
            "${GPG_HOME}" "${PASS_FILE}" >> ~/.rpmmacros

          echo "rpmmacros configured:"
          cat ~/.rpmmacros

      # ── Build RPMs ────────────────────────────────────────────────────────
      # rpmbuild -ta builds all RPMs + SRPM from the in-tarball spec.
      # Richard's design doc §6.1 uses -ta ("build all").
      - name: Build Slurm RPMs
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.slurm_version }}"
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          echo "Starting rpmbuild -ta ..."
          rpmbuild -ta \
            --define "_topdir $(pwd)/rpmbuild" \
            "slurm-${VERSION}.tar.bz2" \
            2>&1 | tee rpmbuild-output.log
          echo "rpmbuild complete."
          echo "--- Built RPMs ---"
          find rpmbuild/RPMS/ -name '*.rpm' | sort
          echo "--- Built SRPMs ---"
          find rpmbuild/SRPMS/ -name '*.rpm' | sort

      # ── Sign RPMs ─────────────────────────────────────────────────────────
      # rpm --addsign uses %__gpg_sign_cmd from ~/.rpmmacros.
      # GNUPGHOME is set via GITHUB_ENV from the import step.
      # Decision: sign binary RPMs only (not the SRPM).
      - name: Sign RPMs
        shell: bash
        run: |
          set -euo pipefail
          RPM_COUNT=$(find rpmbuild/RPMS/x86_64/ -name '*.rpm' | wc -l)
          echo "Signing ${RPM_COUNT} RPMs ..."
          rpm --addsign rpmbuild/RPMS/x86_64/*.rpm
          echo "Signing complete."

      # ── Verify RPM signatures ─────────────────────────────────────────────
      # Hard gate: every binary RPM must carry a valid signature.
      - name: Verify RPM signatures
        shell: bash
        run: |
          set -euo pipefail
          rpm --import build/slurm/keys/clustr-release.asc.pub

          echo "--- Verifying RPM signatures ---"
          FAIL=0
          for RPM in rpmbuild/RPMS/x86_64/*.rpm; do
            RESULT=$(rpm -K "${RPM}" 2>&1)
            echo "  ${RPM##*/}: ${RESULT}"
            if ! echo "${RESULT}" | grep -qi "OK"; then
              echo "  FAIL: signature check failed for ${RPM}"
              FAIL=1
            fi
          done

          if [ "${FAIL}" -ne 0 ]; then
            echo "FATAL: one or more RPMs failed signature verification"
            exit 1
          fi
          echo "All RPM signatures verified OK."

      # ── Stage bundle directory ────────────────────────────────────────────
      # Bundle layout per docs/slurm-build-pipeline.md §6.4:
      #   ./manifest.json
      #   ./RPM-GPG-KEY-clustr
      #   ./el9-x86_64/*.rpm
      #   ./el9-x86_64/repodata/
      #
      # Decision: pack without a top-level wrapper dir so tar xzf drops
      # files directly, satisfying the repomd.xml sanity check and
      # simplifying PR3 extraction (no strip-components needed).
      - name: Stage bundle directory
        shell: bash
        run: |
          set -euo pipefail
          OS="${{ matrix.target.os }}"
          ARCH="${{ matrix.target.arch }}"
          mkdir -p "bundle/${OS}-${ARCH}"
          cp rpmbuild/RPMS/x86_64/*.rpm "bundle/${OS}-${ARCH}/"
          cp build/slurm/keys/clustr-release.asc.pub bundle/RPM-GPG-KEY-clustr
          echo "Bundle staged: $(ls bundle/${OS}-${ARCH}/*.rpm | wc -l) RPMs"

      # ── Generate repo metadata ────────────────────────────────────────────
      - name: Generate repodata with createrepo_c
        shell: bash
        run: |
          set -euo pipefail
          OS="${{ matrix.target.os }}"
          ARCH="${{ matrix.target.arch }}"
          createrepo_c "bundle/${OS}-${ARCH}/"
          echo "--- repodata generated ---"
          ls -la "bundle/${OS}-${ARCH}/repodata/"

      # ── Generate manifest.json ────────────────────────────────────────────
      # Uses build/slurm/gen-manifest.py (committed helper script) to avoid
      # inline multi-line Python which has YAML parse issues in some parsers.
      # bundle_sha256 is set to "__PENDING__" and updated after tarball creation.
      - name: Generate manifest.json
        shell: bash
        run: |
          set -euo pipefail
          BUILT_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TARGET_DIR="bundle/${{ matrix.target.os }}-${{ matrix.target.arch }}"
          SLURM_VERSION="${{ steps.versions.outputs.slurm_version }}"
          CLUSTR_RELEASE="${{ steps.versions.outputs.clustr_release }}"
          OS="${{ matrix.target.os }}"
          ARCH="${{ matrix.target.arch }}"
          BUILD_SHA="${GITHUB_SHA}"
          OUTPUT_FILE="bundle/manifest.json"

          export TARGET_DIR SLURM_VERSION CLUSTR_RELEASE DISTRO="${OS}" ARCH BUILT_AT BUILD_SHA OUTPUT_FILE
          python3 build/slurm/gen-manifest.py

      # ── Create bundle tarball and compute SHA256 ──────────────────────────
      - name: Create bundle tarball
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.versions.outputs.slurm_version }}"
          CLUSTR_RELEASE="${{ steps.versions.outputs.clustr_release }}"
          OS="${{ matrix.target.os }}"
          ARCH="${{ matrix.target.arch }}"
          BUNDLE_NAME="clustr-slurm-bundle-v${VERSION}-clustr${CLUSTR_RELEASE}-${OS}-${ARCH}.tar.gz"

          echo "Creating ${BUNDLE_NAME} ..."
          tar czf "${BUNDLE_NAME}" -C bundle .

          BUNDLE_SHA256=$(sha256sum "${BUNDLE_NAME}" | awk '{print $1}')
          echo "Bundle SHA256: ${BUNDLE_SHA256}"

          echo "${BUNDLE_SHA256}  ${BUNDLE_NAME}" > "${BUNDLE_NAME}.sha256"

          # Update the release-level manifest.json with the real bundle_sha256.
          # The manifest inside the tarball keeps __PENDING__ (avoids circularity).
          # PR3 reads this top-level manifest.json to embed the SHA256 in ldflags.
          python3 -c "import json,sys; d=json.load(open('bundle/manifest.json')); d['bundle_sha256']=sys.argv[1]; json.dump(d,open('bundle/manifest.json','w'),indent=2)" "${BUNDLE_SHA256}"

          echo "bundle_name=${BUNDLE_NAME}" | tee -a "$GITHUB_OUTPUT"
          echo "bundle_sha256=${BUNDLE_SHA256}" | tee -a "$GITHUB_OUTPUT"

          echo ""
          echo "--- Bundle summary ---"
          echo "  File   : ${BUNDLE_NAME}"
          echo "  SHA256 : ${BUNDLE_SHA256}"
          ls -lh "${BUNDLE_NAME}"

      # ── Sanity check ──────────────────────────────────────────────────────
      - name: Sanity check bundle contents
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_NAME="${{ steps.bundle.outputs.bundle_name }}"

          echo "--- Bundle contents (first 60 lines) ---"
          tar tzf "${BUNDLE_NAME}" | head -60

          echo ""
          echo "--- Checking for repomd.xml ---"
          if ! tar tzf "${BUNDLE_NAME}" | grep -q "^\./el9-x86_64/repodata/repomd\.xml$"; then
            echo "FATAL: repomd.xml not found at ./el9-x86_64/repodata/repomd.xml"
            tar tzf "${BUNDLE_NAME}" | grep -i repomd || echo "  (none)"
            exit 1
          fi
          echo "repomd.xml present - OK"

          echo ""
          echo "--- Release-level manifest.json ---"
          cat bundle/manifest.json

      # ── Upload artifacts for the release job ─────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slurm-build-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            rpmbuild/RPMS/x86_64/*.rpm
            ${{ steps.bundle.outputs.bundle_name }}
            ${{ steps.bundle.outputs.bundle_name }}.sha256
            bundle/manifest.json
            bundle/RPM-GPG-KEY-clustr
            rpmbuild-output.log
          if-no-files-found: error
          retention-days: 30

  # ── Release job ───────────────────────────────────────────────────────────
  # Runs after all build matrix jobs pass.  Downloads build artifacts,
  # creates the GitHub Release, and uploads all assets.
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: slurm-build-*
          merge-multiple: true
          path: release-assets/

      - name: List release assets
        shell: bash
        run: |
          echo "--- Release assets ---"
          find release-assets/ -type f | sort

      # ── Parse release metadata ─────────────────────────────────────────────
      - name: Parse release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" | tee -a "$GITHUB_OUTPUT"

          SLURM_VERSION=$(echo "${TAG}" | sed 's/slurm-v\(.*\)-clustr[0-9]*/\1/')
          CLUSTR_N=$(echo "${TAG}" | sed 's/.*-clustr\([0-9]*\)$/\1/')
          echo "slurm_version=${SLURM_VERSION}" | tee -a "$GITHUB_OUTPUT"
          echo "clustr_n=${CLUSTR_N}" | tee -a "$GITHUB_OUTPUT"

          BUNDLE_SHA256=$(python3 -c "import json; print(json.load(open('release-assets/manifest.json'))['bundle_sha256'])")
          echo "bundle_sha256=${BUNDLE_SHA256}" | tee -a "$GITHUB_OUTPUT"

          echo "  tag           : ${TAG}"
          echo "  slurm_version : ${SLURM_VERSION}"
          echo "  clustr_n      : ${CLUSTR_N}"
          echo "  bundle_sha256 : ${BUNDLE_SHA256}"

      # ── Create the GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          SLURM_VERSION: ${{ steps.meta.outputs.slurm_version }}
          CLUSTR_N: ${{ steps.meta.outputs.clustr_n }}
          BUNDLE_SHA256: ${{ steps.meta.outputs.bundle_sha256 }}
        run: |
          set -euo pipefail

          BUNDLE_FILE=$(find release-assets/ -name 'clustr-slurm-bundle-*.tar.gz' | head -1)
          BUNDLE_NAME=$(basename "${BUNDLE_FILE}")

          export BUNDLE_NAME OUTPUT_FILE=/tmp/release-notes.md
          python3 build/slurm/gen-release-notes.py

          ASSET_ARGS=()
          ASSET_ARGS+=("${BUNDLE_FILE}")
          ASSET_ARGS+=("${BUNDLE_FILE}.sha256")
          ASSET_ARGS+=("release-assets/manifest.json")
          ASSET_ARGS+=("release-assets/RPM-GPG-KEY-clustr#RPM-GPG-KEY-clustr")

          for RPM in release-assets/*.rpm; do
            [ -f "${RPM}" ] && ASSET_ARGS+=("${RPM}")
          done

          if [ -f "release-assets/rpmbuild-output.log" ]; then
            ASSET_ARGS+=("release-assets/rpmbuild-output.log#BUILD-LOG.txt")
          fi

          echo "Creating GitHub Release: ${TAG}"
          echo "Asset count: ${#ASSET_ARGS[@]}"

          gh release create "${TAG}" \
            --title "Slurm ${SLURM_VERSION} (clustr${CLUSTR_N})" \
            --notes-file /tmp/release-notes.md \
            "${ASSET_ARGS[@]}"

          echo ""
          echo "Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

      - name: Print bundle SHA256 for PR3 ldflags
        shell: bash
        run: |
          echo ""
          echo "================================================================"
          echo "  Bundle SHA256 (embed into clustr-server binary via ldflags):"
          echo "  ${{ steps.meta.outputs.bundle_sha256 }}"
          echo "================================================================"
